<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANNABE 회원수정</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/old/reset.css">
    <link rel="stylesheet" href="/static/css/old/onlineStyle.css">
    <link rel="stylesheet" href="/static/css/UpdateProfile.css">
    <script   src="https://code.jquery.com/jquery-3.7.1.min.js"   integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="  crossorigin="anonymous"></script>

</head>
<body>
<div class="container">
    <!-- 헤더 -->
    <header>
        <div class="logo">
            <a href="#" class="logo"><img src="/images/common/logo_full.png"></a>
            <span>WANNABE</span>
        </div>
        <div class="header-right">
            <ul>
                <li class="IP" id="IP" value="(접속IP 127.0.0.1)"></li>
                <li class="Name" id="Name" value="홍갈동"></li>
                <li><a><img src="/images/common/homeIcon.png"></a></li>
                <li><a href="#"><img src="/images/common/option.png"></a></li>
                <li><a href="#" class="btn nobtn">로그아웃</a></li>
            </ul>
        </div>
    </header>

    <!-- 네비게이션 -->
    <nav>
        <ul>
            <li>내 미니홈피</li>
            <li>선물하기</li>
            <li>장바구니</li>
            <li>공지사항</li>
            <li>ABOUT US</li>
        </ul>
    </nav>

    <!-- 메인 콘텐츠 -->
    <main>
        <section class="signup-form">
            <h1>회원가입 수정</h1>

            <!--수정불가한 정보-->
            <section>
                    <!--아이디-->
                <div>
                    <label class="">아이디</label>
                    <span class="userId" id="userId"></span>
                </div>

                    <!--이름-->
                <div>
                    <label class="">이름</label>
                    <span class="userName" id="userName"></span>
                </div>

                <!--생년월일-->
                <div>
                    <label>생년월일</label>
                    <span class="birthd" id="birthd"></span>
                </div>

                <!--성별-->
                <div>
                    <label>성별</label>
                    <span class="gender" id="gender"></span>
                </div>
            </section>

            <!-- 비밀번호 변경 -->
            <div class="form-group">
                <label>비밀번호 변경</label>
                <div class="password-group">
                    <label>현재 비밀번호</label><br>
                    <input type="password" placeholder="현재 비밀번호"><br>
                    <label>새 비밀번호</label><br>
                    <input type="password" placeholder="새 비밀번호"><br>
                    <label>새 비밀번호 다시 입력</label><br>
                    <input type="password" placeholder="비밀번호 다시 입력하여 주세요">
                </div>
            </div>

            <!-- 개인정보 변경 -->
            <div class="form-group">
                <label>개인정보 변경</label>
                <div class="join-date">
                    <label>이메일</label>
                    <input type="text" class="Email" id="Email">
                    <a href="#" class="">중복확인</a>
                </div>
                <div class="join-date">
                    <label>전화번호</label>
                    <input type="text" class="PoneNumber" id="PoneNumber">
                    <a href="#" class="btn di small">중복확인</a>
                </div>
            </div>

            <!-- 수정 완료 버튼 -->
            <div class="form-group">
                <button class="submit-btn">수정 완료</button>
            </div>
        </section>
    </main>

    <!-- 푸터 -->
    <footer>
        <div class="footer-left">
            <span>TEAM_WANNABEDev</span>
            <span>SINCE. 2025.2.24-</span>
        </div>
        <div class="footer-right">
            <ul>
                <li>내 미니홈피</li>
                <li>선물하기</li>
                <li>장바구니</li>
                <li>공지사항</li>
                <li>ABOUT US</li>
            </ul>
        </div>
    </footer>
</div>
</body>
</html>
