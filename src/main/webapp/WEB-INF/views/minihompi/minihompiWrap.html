 <script>
        $(document).ready(function () {
            const hompMain_url = "/mini-hompi/hompiMain"; // 서버에서 제공하는 URL

            // AJAX 호출
            $.ajax({
                type: "GET",
                url: hompMain_url,
                dataType: "html",
                success: function (data) {
                    $("#mainWrapBackground").html(data); // 가져온 데이터를 삽입
                },
                error: function (xhr, status, error) {
                    $("#mainWrapBackground").html("페이지 로딩 실패: " + error);
                }
            });
        });
    </script>
