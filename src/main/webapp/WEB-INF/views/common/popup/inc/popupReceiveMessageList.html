<div id="popMsgListContainer" th:attr="data-totalPages=${totalPages}, data-totalUnreadMsg=${receiveUnreadMsgCount}" >
    <div id="popMsgListTitle">
        <input class="msgListTitle receivemsgChkbox" type="checkbox">
        <span class="msgListTitle popMsg-insertUserId">보낸사람</span>
        <span class="msgListTitle popMsg-Msg">내용</span>
        <span class="msgListTitle popMsg-date">날짜</span>
    </div>

    <div id="msgListBox">
        <div class="popMsgListBox dFlex"
             th:each="msg : ${msgList}"
             th:class="${msg.ReadYN == 'N' ? 'unread' : 'read'}">
            <input type="checkbox" class="msgChkbox">
            <span class="popMsg-insertUserId" style="color: #e07b00;" th:text="${msg.friendUserId == 0 ? 'WANNABE' : msg.name}"></span>
            <span class="popMsg-Msg" th:text="${#strings.abbreviate(msg.message, 15)}" th:attr="onclick=|fncMsgView(${msg.messageId}, this, 'receive')|"></span>
            <span class="popMsg-date" th:text="${#dates.format(msg.insertDT, 'yyyy.MM.dd HH:mm')}" th:attr="onclick=|fncMsgView(${msg.messageId}, this, 'receive')|"></span>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <div id="pagination">
        <!--<button id="prevPage">&lt;&lt;</button>-->
        <span id="pageNumbers"></span> <!-- 페이지 번호 버튼을 여기에 추가 -->
        <!--<button id="nextPage">&gt;&gt;</button>-->
    </div>
</div>

<script>
    let totalChkBox;
    $(".receivemsgChkbox").click(function (){
        console.log("받은메세지함전체선택")
        let receivemsgChkbox = $(".receivemsgChkbox").prop("checked");

        if (receivemsgChkbox) {
            $(".receivemsgChkbox").prop("checked",true)
            $(".msgChkbox").prop("checked", true);
            totalChkBox = $(".msgChkbox:checked").length;
            console.log("totalChkBox : " + totalChkBox);
            console.log("===========");
        } else {
            $(".msgChkbox").prop("checked", false);
        }

    });
    $(".msgChkbox").click(function (){
        let msgChkbox = $(".msgChkbox:checked").length;

       if (msgChkbox === totalChkBox) {
         $(".receivemsgChkbox").prop("checked",true);
       } else {
           $(".receivemsgChkbox").prop("checked", false);
       }
        console.log("msgChkbox : " + msgChkbox);
        console.log("totalChkBox : " + totalChkBox);
    });
</script>
