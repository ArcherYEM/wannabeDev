<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="워너비">
    <link rel="icon" th:href="@{/static/favicon.ico}" type="image/x-icon" />
    <title>워너비</title>
    
    <!-- library -->
    
    <link href="http://cdn.jsdelivr.net/xeicon/2/xeicon.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- custom common  -->
    
    <link rel="stylesheet" th:href="@{/static/css/common/reset.css}"/>
    <link rel="stylesheet" th:href="@{/static/css/common/onlineStyle.css}"/>
    <link rel="stylesheet" th:href="@{/static/css/common/common.css}"/>
    <link rel="stylesheet" th:href="@{/static/css/common/header.css}"/>
    <link rel="stylesheet" th:href="@{/static/css/common/footer.css}"/>
    
    <style>
        /* 모달 레이어 */
        .modal-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            width: 400px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .modal-content .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .modal-content .modal-tabs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-content .modal-tabs button {
            width: 50%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        .modal-content .modal-tabs button.active {
            background-color: #007bff;
            color: #fff;
        }
        .modal-content .input-group {
            margin-bottom: 15px;
        }
        .modal-content .input-group label {
            display: block;
            margin-bottom: 5px;
        }
        .modal-content .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .modal-content .input-group .select-group {
            display: flex;
        }
        .modal-content .input-group select {
            width: 33.3%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .modal-content .input-group button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        .modal-content .btn-group {
            display: flex;
            justify-content: space-between;
        }
        .modal-content .btn-group button {
            width: 48%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        .modal-content #show-id-layer button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        
    </style>
</head>
