<html lang="ko" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>onlineMain</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/onlineStyle.css">
    <link href="http://cdn.jsdelivr.net/xeicon/2/xeicon.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<!--    <script src="/static/js/home/login.js"></script>-->

    <link rel="stylesheet" href="/static/css/notice/notice.css">
</head>
<body>
<script>
    $(document).ready(function(){
        $(".signupBtn").click(function() {
            location.href="/signup";
        });
    });
</script>
<div id="wrap">

    <!--헤더 시작-->
    <th:block th:include="/common/layout/fragments/header :: header"></th:block>
    <!--헤더 끝-->

    <!--메인 시작-->
    <div id="container">
        <div class="containerWrap">
            <div id="menu">
                <a> 공지 관리</a>
                <a> 배너 관리</a>
            </div>
            <div id="main">
                <div class="menu_title">
                    <h1> 공지사항 </h1>
                    <h2> 등록하기 </h2>
                    <h2> 수정하기 </h2>
                </div>
                <div class="notice">
                    <div class="formal">
                        <select id="data-limit">
                            <option value="10">10개씩 보기</option>
                            <option value="30">30개씩 보기</option>
                            <option value="50">50개씩 보기</option>
                        </select>
                        <select>
                            <option>분류 선택</option>
                            <option>키워드입력 후 검색</option>
                            <option>검색 대상 선택</option>
                        </select>
                        <select>
                            <option>제목 + 내용</option>
                            <option>내용</option>
                            <option>제목</option>
                        </select>
                        <div class="search">
                            <input type="search" placeholder="입력창">
<!--                            <button>-->
<!--                                <img src="/static/images/common/close.png">-->
<!--                            </button>-->
                        </div>
                    </div>
                    <div>
                        <table>
                            <tr class="top">
                                <th>
                                    <input type="checkbox">
                                </th>
                                <th>분류(전체)</th>
                                <th>제목</th>
                                <th>게시일</th>
                                <th>작성일</th>
                                <th>작성자</th>
                            </tr>
                            <tr th:each="notice : ${notices}">
                                <th>
                                    <input type="checkbox"></input>
                                </th>
                                <th th:text="${notice.noticeType}">공지 사항</th>
                                <th><a th:text="${notice.noticeTitle}">취업하고 놀고 싶다~!!</a></th>
                                <th th:text="${notice.getDateRange}">2025.03.19~2025.03.21</th>
                                <th th:text="${notice.insertDT}">2025.03.19</th>
                                <th th:text="${notice.loginId}">산토끼</th>
                            </tr>
                        </table>
                    </div>
                    <div class="page">
                        <button class="delete">선택 삭제</button>
                        <span id="page-numbers">
                            <button id="prev-btn" class="prev"></button>
                            <button>1</button>
                            <button class="active">2</button>
                            <button>3</button>
                            <button>4</button>
                            <button>5</button>
                            <button>6</button>
                            <button>7</button>
                            <button>8</button>
                            <button>9</button>
                            <button>10</button>
                            <button id="next-btn" class="next"></button>
                        </span>
                        <button class="create">등록</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--메인 끝-->

    <!--푸터 시작-->
    <th:block th:include="/common/layout/fragments/footer :: footer"></th:block>
    <!--푸터 끝-->


</div>
</body>
</html>
