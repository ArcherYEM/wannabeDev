<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>onlineMain</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/onlineStyle.css">
    <link rel="stylesheet" href="/static/css/userUpdate.css">
    <link href="http://cdn.jsdelivr.net/xeicon/2/xeicon.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body>
<div id="wrap">
    <!--헤더 시작-->
    <th:block th:include="/common/layout/fragments/header :: header"></th:block>
    <!--헤더 끝-->
    <div id="container">
        <div class="containerWrap">
            <div class="userUpdateWrap">
                <div class="userInfoModify">
                    <h2>회원정보 수정</h2>
                    <p class="subTitle">기본정보</p>
                    <div class="userBox defaultInfoBox">
                        <div class="defaultKey">
                            <span>아이디</span>
                            <span>이름</span>
                            <span>생년월일</span>
                            <span>성별</span>
                        </div>
                        <div class="defaultValue">
                            <span>login_test</span>
                            <span>김마요</span>
                            <span>1999.01.01</span>
                            <span>남성</span>
                        </div>
                    </div>
                    <p class="subTitle">비밀번호 변경</p>
                    <div class="userBox changePwdBox">
                        <div class="inputWrap">
                            <label for="oldPwd">현재 비밀번호</label>
                            <input id="oldPwd" type="password" placeholder="비밀번호를 입력하세요"/>
                        </div>
                        <div class="inputWrap">
                            <label for="newPwd">새 비밀번호</label>
                            <input id="newPwd" type="password" placeholder="비밀번호를 입력하세요"/>
                        </div>
                        <div class="inputWrap">
                            <div class="checkPwdWrap">
                                <label for="checkPwd">새 비밀번호 확인</label>
                                <span id="pwdMatchMsg" class="pwd-match-msg"></span>
                            </div>
                            <input id="checkPwd" type="password" placeholder="비밀번호를 재입력하세요"/>
                        </div>
                    </div>
                    <p class="subTitle">개인정보 변경</p>
                    <div class="userBox changeInfoBox">
                        <div class="inputWrap">
                            <label for="email">이메일 변경</label>
                            <div class="inputButtonBox">
                                <input id="email" type="email" placeholder="이메일을 입력하세요"/>
                                <button class="checkButton">중복확인</button>
                            </div>

                        </div>
                        <div class="inputWrap">
                            <label for="phone">휴대폰 번호 변경</label>
                            <div class="inputButtonBox">
                                <input id="phone" type="tel" placeholder="번호를 입력하세요"/>
                                <button class="checkButton">중복확인</button>
                            </div>
                        </div>
                    </div>
                    <div class="buttonWrap">
                        <button>수정완료</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 여기다 작업하셈 -->

    <!--푸터 시작-->
    <th:block th:include="/common/layout/fragments/footer :: footer"></th:block>
    <!--푸터 끝-->
    <script src="/static/js/home/userUpdate.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

</div>

</body>
</html>
