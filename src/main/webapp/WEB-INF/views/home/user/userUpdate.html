<!DOCTYPE html>
<html lang="ko"
      layout:decorate="~{/common/layout/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title layout:fragment="title">회원정보 수정</title>
    <!-- 회원정보수정 페이지 전용 스타일 -->
    <link layout:fragment="styles" rel="stylesheet" th:href="@{static/css/userUpdate.css}">
    <th:block th:replace="common/layout/fragments/favicon :: favicon"></th:block>
</head>
<body>
<div layout:fragment="content">
    <!-- 회원정보 수정 -->
    <div id="container">
        <div class="containerWrap">
            <div class="userUpdateWrap">
                <div class="userInfoModify">
                    <h2>회원정보 수정</h2>
                    <p class="subTitle">기본정보</p>
                    <div class="userBox defaultInfoBox">
                        <div class="defaultKey">
                            <span>아이디</span>
                            <span>이름</span>
                            <span>생년월일</span>
                            <span>성별</span>
                        </div>
                        <div class="defaultValue">
                            <span id="user_id"></span>
                            <span id="user_name"></span>
                            <span id="user_birth"></span>
                            <span id="user_gender"></span>
                        </div>
                    </div>
                    <div class="titleWrap">
                        <p class="subTitle">비밀번호 변경</p>
                        <button id="passWdWrap">비밀번호 변경</button>
                    </div>
                  <div class="userBox changePwdBox">
                      <div class="inputWrap">
                          <div class="checkWrap">
                              <label for="oldPwd">현재 비밀번호</label>
                              <span class="checkMsg" id="oldPwdMsg"></span>
                          </div>
                          <div class="inputButtonBox">
                              <input id="oldPwd" placeholder="비밀번호를 입력하세요" type="password"/>
                              <button class="checkButton" id="checkOldPwd">입력확인</button>
                          </div>
                      </div>
                        <div class="changeWrap">
                        <div class="inputWrap">
                            <label for="newPwd">새 비밀번호</label>
                            <input id="newPwd" placeholder="비밀번호를 입력하세요" type="password"/>
                        </div>
                        <div class="inputWrap">
                            <div class="checkWrap">
                                <label for="checkPwd">새 비밀번호 확인</label>
                                <span class="pwd-match-msg" id="pwdMatchMsg"></span>
                            </div>
                            <input id="checkPwd" placeholder="비밀번호를 재입력하세요" type="password"/>
                        </div>
                        </div>
                    </div>
                    <div class="titleWrap">
                        <p class="subTitle">개인정보 변경</p>
                        <button id="InfoWdWrap">개인정보 변경</button>
                    </div>
                    <div class="userBox changeInfoBox">
                        <div class="inputWrap">
                            <div class="checkWrap">
                                <label for="email">이메일 변경</label>
                                <span class="checkMsg" id="emailMsg"></span>
                            </div>
                            <div class="inputButtonBox">
                                <input id="email" placeholder="이메일을 입력하세요" type="email"/>
                                <button class="checkButton" id="checkEmail">중복확인</button>
                            </div>
                        </div>
                        <div class="inputWrap">
                            <div class="checkWrap">
                                <label for="phone">휴대폰 번호 변경</label>
                                <span class="checkMsg" id="phoneMsg"></span>
                            </div>
                            <div class="inputButtonBox">
                                <input id="phone" placeholder="번호를 입력하세요" type="tel"/>
                                <button class="checkButton" id="checkPhone">중복확인</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- 회원정보수정 페이지 전용 JS -->
<th:block layout:fragment="scripts">
    <script src="/static/js/home/userUpdate.js"></script>
</th:block>
</body>
</html>
