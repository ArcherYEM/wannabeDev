<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout/layout}">
<head>
    <title layout:fragment="title">회원가입</title>
    <!-- 회원가입 페이지 전용 스타일 -->
    <link rel="stylesheet" th:href="@{static/css/home/signup.css}" layout:fragment="styles">
    <link rel="stylesheet" th:href="@{static/css/home/modal.css}" layout:fragment="styles">
</head>
<body>
<div layout:fragment="content">
    <!-- 회원가입 -->
    <div id="container">
        <div class="containerWrap joinContainer">
            <h2>회원가입</h2>
            <div class="joinDiv">
                <div class="joinTitle">
                    <p class="title">아이디</p>
                    <p class="checkMatch loginId">&nbsp;</p>
                </div>
                <div class="joinInputWrap smallWrap">
                    <input type="text" id="i_loginId" placeholder="아이디 입력">
                    <button class="btn checkbtn checkDuplicate" id="checkDuplicateLoginId">중복확인</button>
                </div>
                <div class="joinTitle">
                    <p class="title">비밀번호</p>
                </div>
                <div class="joinInputWrap">
                    <input type="password" id="i_password" placeholder="비밀번호 입력">
                </div>
                <div class="joinTitle">
                    <p class="title">비밀번호 확인</p>
                    <p class="checkMatch checkbtn pwd">&nbsp;</p>
                </div>
                <div class="joinInputWrap smallWrap">
                    <input type="password" id="i_passwordChk" placeholder="비밀번호 확인">
                </div>
                <div class="joinTitle">
                    <p class="title">이름</p>
                </div>
                <div class="joinInputWrap">
                    <input type="text" id="name" placeholder="이름 입력">
                </div>
                <div class="joinTitle">
                    <p class="title">생년월일</p>
                    <p class="checkMatch birth"></p>
                </div>
                <div class="joinInputWrap">
                    <ul id="birthSelectList">
                        <li>
                            <select name="birthYear" id="birthYear" class="select rightNotation">
                                <option value="" hidden selected>년</option>
                            </select>
                        </li>
                        <li>
                            <select name="birthMonth" id="birthMonth" class="select rightNotation">
                                <option value="" hidden selected>월</option>
                            </select>
                        </li>
                        <li>
                            <select name="birthDay" id="birthDay" class="select rightNotation">
                                <option value="" hidden selected>일</option>
                            </select>
                        </li>
                    </ul>

                </div>
                <div class="joinTitle">
                    <p class="title">성별</p>
                </div>
                <div class="joinInputWrap">
                    <select id="gender" class="select leftNotation">
                        <option value="" hidden selected>성별</option>
                        <option value="M">남자</option>
                        <option value="F">여자</option>
                    </select>
                </div>
                <div class="joinTitle">
                    <p class="title">이메일</p>
                    <p class="checkMatch email"></p>
                </div>
                <div class="joinInputWrap">
                    <input type="text" id="email" placeholder="이메일 입력">
                    <button class="btn checkbtn checkDuplicate" id="checkDuplicateEmail">중복확인</button>
                </div>
                <div class="joinTitle">
                    <p class="title">휴대폰번호</p>
                    <p class="checkMatch phoneNo"></p>
                </div>
                <div class="joinInputWrap">
                    <input type="text" id="phoneNo" placeholder="휴대폰 번호 입력">
                    <button class="btn checkbtn smallcheckDuplicate" id="checkDuplicatePhoneNo">중복확인</button>
                </div>
                <div th:replace="/home/fragment/modal :: modalFragment"></div>
                <div class="joinInputWrap">
                    <button id="signUpBtn" class="btn">회원가입</button>
                </div>

            </div>
        </div>
    </div>
</div>
<!-- 회원가입 페이지 전용 JS -->
<th:block layout:fragment="scripts">
    <script src="/static/js/home/signup.js"></script>
    <script src="/static/js/home/modal.js"></script>
</th:block>
</body>
</html>
