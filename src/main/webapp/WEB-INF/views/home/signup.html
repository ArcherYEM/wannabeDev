<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>onlineMain</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/onlineStyle.css">
    <link rel="stylesheet" href="/static/css/signup.css">
    <link rel="stylesheet" href="/static/css/modal.css">
    <link href="http://cdn.jsdelivr.net/xeicon/2/xeicon.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"   integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="  crossorigin="anonymous"></script>
</head>
<body>
<div id="wrap">
    <!--헤더 시작-->
    <th:block th:include="/common/layout/fragments/header :: header"></th:block>
    <!--헤더 끝-->

    <!--메인 시작-->
    <div id="container">
        <div class="containerWrap joinContainer">
            <div class="joinDiv mt30">

                <p class="joinTitle">아이디</p>
                <div class="joinInputWrap">
                    <input type="text" id="loginId" placeholder="아이디 입력">
                    <a href="#" class="btn di small checkDuplicate" id="checkDuplicateLoginId">중복확인</a>
                    <p class="checkMatch loginId"></p>
                </div>

                <p class="joinTitle">비밀번호</p>
                <div class="joinInputWrap">
                    <input type="password" id="password" placeholder="비밀번호 입력">
                </div>
                <p class="joinTitle">비밀번호 확인</p>
                <div class="joinInputWrap">
                    <input type="password" id="passwordChk" placeholder="비밀번호 확인">
                    <p class="checkMatch pwd"></p>
                </div>

                <p class="joinTitle">이름</p>
                <div class="joinInputWrap">
                    <input type="text" id="name" placeholder="이름 입력">
                </div>

                <p class="joinTitle">생년월일</p>
                <div class="joinInputWrap">
                    <ul id="birthSelectList">
                        <li>
                            <select name="birthYear" id="birthYear" class="select rightNotation">
                                <option value="" hidden selected>년</option>
                            </select>
                        </li>
                        <li>
                            <select name="birthMonth" id="birthMonth" class="select rightNotation">
                                <option value="" hidden selected>월</option>
                            </select>
                        </li>
                        <li>
                            <select name="birthDay" id="birthDay" class="select rightNotation">
                                <option value="" hidden selected>일</option>
                            </select>
                        </li>
                    </ul>
                </div>

                <p class="joinTitle">성별</p>
                <div class="joinInputWrap">
                    <select id="gender" class="select leftNotation">
                        <option value="" hidden selected>성별</option>
                        <option value="M">남자</option>
                        <option value="F">여자</option>
                    </select>
                </div>

                <p class="joinTitle">이메일</p>
                <div class="joinInputWrap">
                    <input type="text" id="email" placeholder="이메일 입력">
                    <a href="#" class="btn di small checkDuplicate" id="checkDuplicateEmail">중복확인</a>
                    <p class="checkMatch email"></p>
                </div>

                <p class="joinTitle">휴대폰번호</p>
                <div class="joinInputWrap">
                    <input type="text" id="phoneNo" placeholder="휴대폰 번호 입력">
                    <a href="#" class="btn di small checkDuplicate" id="checkDuplicatePhoneNo">중복확인</a>
                    <p class="checkMatch phoneNo"></p>
                </div>

                <div th:replace="/home/fragment/modal :: modalFragment"></div>

                <div class="joinInputWrap">
                    <button id="signUpBtn" class="btn">회원가입</button>
                </div>

            </div>
        </div>
    </div>
    <!--메인 끝-->

    <!--푸터 시작-->
    <th:block th:include="/common/layout/fragments/footer :: footer"></th:block>
    <!--푸터 끝-->

</div>
<script src="/static/js/home/login.js"></script>
<script src="/static/js/home/signup.js"></script>
<script src="/static/js/home/modal.js"></script>
</body>
</html>
