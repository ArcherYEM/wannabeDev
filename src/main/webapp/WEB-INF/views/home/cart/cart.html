<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout/layout}">
<head layout:fragment="styles">
    <!-- 장바구니 페이지 전용 스타일 -->
    <title layout:fragment="title">장바구니</title>
    <link rel="stylesheet" th:href="@{static/css/home/cart.css}" >
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="cartContainer">
            <div class="menuTitle">
                <h1> 장바구니 </h1>
            </div>
            <div class="cartWrapper">
                <!-- 상단 선택박스 영역 -->
                <div class="cartCheckWrapper">
                    <div class="checkAllWrapper">
                        <input id="cartSelectAll" type="checkbox"/>
                        <label for="cartSelectAll" class="selectAll">전체선택</label>
                    </div>
                    <button class="selectDel">선택항목 삭제</button>
                </div>
                <!-- 상단 선택박스 영역 -->
                <!-- 하단 영역 -->
                <div class="cartInfoWrapper">
                    <!-- 장바구니 -->
                    <div class="itemListWrap">
                        <!-- 미니홈피 아이템 장바구니 리스트 -->
                        <div class="cartBox cartMini">
                            <p class="cartTitle">미니홈피 아이템</p>
                            <div class="itemBox">

                            </div>
                        </div>
                        <div class="cartBox cartMusic">
                            <p class="cartTitle">음반가게 BGM</p>
                            <div class="itemBox">
                            </div>
                        </div>
                    </div>
                    <!-- 장바구니 -->
                    <!-- 주문정보 -->
                    <div class="cartOrderWrap">
                        <p class="cartOrderTitle">합계</p>
                        <div class="cartTotalFrame">
                            <div class="cartTotalGroup">
                                <div class="selectedItem">
                                    <p><span class="totalCategory">미니홈피</span></p>
                                    <p><span id="hompi-item-count">0</span><span> 건</span></p>
                                </div>
                                <div class="selectedPrice">
                                    <img class="dotori-icon" src="/static/images/common/icon/dotori.png" alt=""/>
                                    <p><span class="totalCount"></span><span> 개</span></p>
                                </div>
                            </div>
                            <div class="cartTotalGroup">
                                <div class="selectedItem">
                                    <p><span class="totalCategory">BGM</span></p>
                                    <p><span id="bgm-item-count">0</span><span> 건</span></p>
                                </div>
                                <div class="selectedPrice">
                                    <img class="dotori-icon" src="/static/images/common/icon/dotori.png" alt=""/>
                                    <p><span class="totalCount"></span><span> 개</span></p>
                                </div>
                            </div>
                        </div>
                        <div class="cartAmountFrame">
                            <div class="totalAmount">
                                <span>총&nbsp;</span><span class="totalCount">0</span><span>&nbsp;건</span>
                            </div>
                            <div class="totalDotori">
                                <img class="dotori-icon" src="/static/images/common/icon/dotori.png" alt=""/>
                                <span class="totalCount">0</span><span>&nbsp;개</span>
                            </div>
                        </div>
                        <div class="cartBtnGroup">
                            <button class="cartBtnOrder">주문하기</button>
                            <button class="cartBtnGift">선물하기</button>
                        </div>
                    </div>
                    <!-- 주문정보 -->
                </div>
                <!-- 하단 영역-->
            </div>
        </div>
    </div>
</div>
<!-- 장바구니 페이지 전용 JS -->
<th:block layout:fragment="scripts">
    <script th:type="module" th:src="@{/static/js/home/cart.js}"></script>
</th:block>
</body>
</html>
