<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout/layout}">
      <th:block th:replace="common/layout/fragments/favicon :: favicon"></th:block>
<head>
  <!-- title 모듈화 필요 -->
  <title layout:fragment="title">장바구니</title>
  <link rel="stylesheet" th:href="@{static/css/notice/notice.css}" layout:fragment="styles">

  <!--추후에 CSS 파일로 분리 필요-->
  <style>
    select { appearance: auto; width:70px; height: 25px; border-radius: 5px; border: 1px solid var(--color-basic); }
    .cart_check_group {margin-top: 50px; padding-bottom: 5px; border-bottom: 2px solid #FF8000; display: flex; align-items: center; gap:5px;}
    .cart_check_group span {font-size: 16px;}
    .cart_check_group input {margin-left: 20px;}
    .cart_container { display: flex; width: 100%; gap: 10px; margin:20px 0 50px 0px;}
    .left_boxes { width: 65%; display: flex; flex-direction: column; gap: 10px; }
    .cart_box1, .cart_box2, .cart_box3 { border: 1px solid #9a9a9a; border-radius: 5px; padding: 15px; }
    .cart_box1, .cart_box2 { min-height:250px; max-height: 500px; }
    .cart_box3 { height: 500px; top: 288px; position:sticky; right: 23%; width:350px; }
    .cart_mini_title { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px; }
    .cart_mini_title_left { border-bottom: 1px solid #9a9a9a; padding: 10px; }
    .cart_item_group { display: flex; align-items: center; gap:10px; padding:20px 0; border-bottom: 1px solid #cfcfcf; }
    .overflow { overflow-x: hidden; overflow-y: auto; height: 400px; }
    .cart_item_chk { flex: 1; }
    .cart_item_img { flex: 3; text-align: center; }
    .cart_item_info { flex: 5; margin-left: 20px; }
    .cart_item_btn { flex: 2; text-align: center; }
    .cart_item_img img { height: 100px; }
    .cart_item_btn img { width: 30px; height: 30px; }
    .cart_item_info_ctgr { color:#595959; }
    .cart_item_info_name { color:#333; font-size: 16px; font-weight: 600; margin: 10px 0 }
    .cart_date { padding-right: 20px; box-sizing: border-box; }
    .cart_total_frame { height: 200px; }
    .cart_total_group { display: flex; align-items: center; gap: 1px; text-align: center; margin-bottom: 20px; color: #595959; font-size: 16px; }
    .cart_total_ctgr { flex: 4; text-align: left; padding-left: 20px; }
    .cart_total_cnt { flex: 4; text-align: left; }
    .cart_total_img { flex: 1; }
    .cart_total_dtr { flex: 2; }
    .cart_total_cnt_data { color:#ff8000; }
    .cart_total_dtr_data { color:#ff8000; }
    .cart_amount_frame { display: flex; align-items: center; gap: 1px; text-align: center; border-top: 1px solid #9a9a9a; padding: 15px 5px 15px 20px; border-bottom: 1px solid #9a9a9a; color: #333; font-size: 20px; font-weight: bold; }
    .cart_amount_cnt { flex: 5; text-align: left; }
    .cart_amount_img { flex: 1; }
    .cart_amount_dtr { flex: 2; }
    .cart_amount_cnt_data { color:#ff8000; margin-right: 5px; margin-left: 40px; }
    .cart_amount_dtr_data { color:#ff8000; margin-right: 5px; }
    .cart_btn_group { padding: 20px; text-align: center; }
    .cart_btn_order, .cart_btn_gift { width: 90%; height: 50px; margin: 10px 0; border-radius: 5px; font-size: 16px; }
    .cart_btn_order { color: #fff; background-color: #ff8000; }
    .cart_btn_order:hover { background-color: #e57500; }
    .cart_btn_gift { color: #ff8000; background-color: #fff; border: 1px solid #ff8000; }
    .cart_btn_gift:hover { background-color: #fffce9; }
  </style>
</head>

<body>

    <!-- 공지사항 -->
    <div id="container">
      <div class="containerWrap">
        <div id="main">

          <div class="menu_title">

              <!-- 음반가게 BGM 장바구니 리스트 -->

                <!-- 리스트 출력부 -->

            <!-- 선택한 장바구니 리스트 합계 -->

              <p class="cart_mini_title">합계</p>

              <div class="cart_total_frame">
                <div class="cart_total_group">
                  <div class="cart_total_ctgr">
                    <span>미니홈피</span>

                  </div>
                </div>

                <div class="cart_total_group">

              <div class="cart_amount_frame">

                  <span class="cart_amount_dtr_data">195</span><span>개</span>
                </div>
              </div>

              <div class="cart_btn_group">
                <button class="cart_btn_order">주문하기</button>
                <button class="cart_btn_gift">선물하기</button>
              </div>

            </div>

          </div>

        </div>
      </div>
    </div>
  </div>

  <th:block layout:fragment="scripts">
    <script src="/static/js/home/cart.js"></script>
  </th:block>
</body>

</html>
